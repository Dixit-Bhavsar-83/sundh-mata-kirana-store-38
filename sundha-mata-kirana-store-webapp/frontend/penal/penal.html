<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Sundha Mata Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #fff; }
        
        /* Smooth scrolling card container */
        .data-section {
            height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: none;
        }
        .data-section::-webkit-scrollbar { display: none; }
        /* Card aur premium feel ke liye */
.user-card {
    background: #121212;
    border: 1px solid #1f1f1f;
    transition: transform 0.2s ease, border-color 0.2s ease;
}
.user-card:hover {
    border-color: #f97316; /* Orange hover effect */
    transform: translateY(-2px);
}
        .user-card {
            background: #161616;
            border: 1px solid #262626;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid #262626;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="lockScreen" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl">
                <i class="fas fa-shield-alt text-black text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">Admin Verification</h2>
            <p class="text-zinc-500 text-sm mb-10 font-semibold tracking-wide">ENTER YOUR 4-DIGIT SECURITY PIN</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="0000" 
                class="bg-transparent text-center text-5xl tracking-[1.5rem] border-b-2 border-zinc-800 w-full mb-12 pb-4 text-white outline-none focus:border-white transition-all font-black">
            <button onclick="verifyPin()" class="w-full bg-white text-black font-extrabold py-5 rounded-[2rem] active:scale-95 transition-all uppercase tracking-widest">
                Unlock Dashboard
            </button>
        </div>
    </div>

    <div id="mainPanel" class="hidden flex flex-col h-screen">
        <header class="p-8 pt-12 shrink-0">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">Sundh Mata kirana Login Data</h1>
                    <p class="text-orange-500 text-[10px] font-black uppercase tracking-[0.3em] mt-1">Live Management</p>
                </div>
                <div class="bg-zinc-900 px-5 py-3 rounded-2xl border border-zinc-800">
                    <span id="totalCount" class="text-xl font-black">0</span>
                    <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Users</p>
                </div>
            </div>

            <div class="mt-8 relative">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600"></i>
                <input type="text" id="searchBar" placeholder="Search customer name or phone..." 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 pl-14 pr-6 text-sm font-semibold focus:border-zinc-500 outline-none transition-all">
            </div>
        </header>

        <main class="data-section px-6 pb-24" id="customerList">
            </main>

        <footer class="glass-nav fixed bottom-0 left-0 right-0 p-6 flex justify-around items-center">
            <button class="text-white flex flex-col items-center gap-1"><i class="fas fa-th-large"></i><span class="text-[9px] font-bold uppercase tracking-tighter">Panel</span></button>
            
            <button class="text-zinc-600 flex flex-col items-center gap-1"><i class="fas fa-history"></i><span class="text-[9px] font-bold uppercase tracking-tighter">Logs</span></button>
            <button onclick="location.reload()" class="text-zinc-600 flex flex-col items-center gap-1"><i class="fas fa-power-off"></i><span class="text-[9px] font-bold uppercase tracking-tighter">Exit</span></button>
        </footer>
    </div>

    <script>
        const ADMIN_PIN = "1983";
        let refreshInterval;

        function verifyPin() {
            const val = document.getElementById('pinInput').value;
            if(val === ADMIN_PIN) {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                startPanel();
            } else {
                alert("Incorrect PIN!");
                document.getElementById('pinInput').value = "";
            }
        }

        async function fetchCustomerData() {
            try {
                const res = await fetch('/api/admin/customers');
                const data = await res.json();
                if(data.status === "success") renderData(data.data);
            } catch (err) { console.log("Backend offline..."); }
        }

        function renderData(users) {
            const list = document.getElementById('customerList');
            document.getElementById('totalCount').innerText = users.length;
            
            list.innerHTML = users.map(u => `
                <div class="user-card">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-500/10 text-orange-500 rounded-2xl flex items-center justify-center font-black text-xl">
                                ${u.name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-extrabold text-white text-lg leading-tight">${u.name}</h3>
                                <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">${u.profession || 'CUSTOMER'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-1 rounded-md font-bold">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>

                    <div class="space-y-3 mb-6">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-phone-alt text-zinc-600 text-xs"></i>
                            <span class="text-sm font-bold text-zinc-200">+91 ${u.phone}</span>
                        </div>
                        <div class="flex items-start gap-3 bg-black/30 p-3 rounded-xl border border-zinc-800/50">
                            <i class="fas fa-map-marker-alt text-orange-500 text-xs mt-1"></i>
                            <div class="text-[11px] font-semibold text-zinc-400 leading-relaxed">
                                ${u.address}, ${u.city}, ${u.state}
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button onclick='shareProfile(${JSON.stringify(u)})' 
                            class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-emerald-500/20">
                            <i class="fas fa-share-nodes"></i> Share Bio
                        </button>
                        <button onclick="deleteEntry('${u.phone}')" 
                            class="w-14 bg-rose-500/10 text-rose-500 py-4 rounded-2xl border border-rose-500/20 flex items-center justify-center active:scale-95 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function shareProfile(u) {
            const bio = `*SUNDHA MATA KIRANA STORE*%0A` +
                        `--------------------------%0A` +
                        `👤 *Name:* ${u.name}%0A` +
                        `📞 *Phone:* ${u.phone}%0A` +
                        `💼 *Profession:* ${u.profession}%0A` +
                        `🏠 *Address:* ${u.address}%0A` +
                        `📍 *City:* ${u.city}, ${u.state}%0A` +
                        `--------------------------%0A` +
                        `_Customer Sync Data_`;
            window.open(`https://wa.me/?text=${bio}`, '_blank');
        }

        async function deleteEntry(phone) {
            if(confirm("Delete this customer?")) {
                await fetch(`/api/admin/delete-customer/${phone}`, { method: 'DELETE' });
                fetchCustomerData();
            }
        }

        function startPanel() {
            fetchCustomerData();
            refreshInterval = setInterval(() => {
                if(document.getElementById('searchBar').value.length === 0) fetchCustomerData();
            }, 5000);
        }

        // Real-time Filtering
        document.getElementById('searchBar').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.user-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Orders - Boss Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-badge { background: #FFF3E0; color: #E65100; }
        /* Smooth Fade Animation */
        #detailOverlay { transition: opacity 0.3s ease, visibility 0.3s ease; }
        #detailOverlay.hidden { opacity: 0; visibility: hidden; display: none; }
        #detailOverlay:not(.hidden) { opacity: 1; visibility: visible; display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-24">

    <header class="p-6 bg-white flex justify-between items-center shadow-sm sticky top-0 z-10">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-800">Live Orders</h1>
            <p class="text-xs font-bold text-orange-500 tracking-widest uppercase">Real-Time Updates</p>
        </div>
        <div class="active-badge px-4 py-1 rounded-full font-bold">
            <span id="activeCount">2</span> Active
        </div>
    </header>

    <div class="px-6 mt-4">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-4 text-slate-400"></i>
            <input id="searchInput" type="text" placeholder="Search by name, phone or ID..." class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-orange-200 outline-none text-slate-600">
        </div>
    </div>

    <main class="px-6 mt-6 space-y-4" id="orderList"></main>

    <div id="detailOverlay" class="fixed inset-0 bg-white z-50 hidden overflow-y-auto">
        <header class="p-6 bg-white flex items-center gap-4 border-b sticky top-0">
            <button onclick="closeDetails()" class="text-slate-800 text-xl p-2 hover:bg-slate-100 rounded-full transition">
                <i class="fa fa-arrow-left"></i>
            </button>
            <div>
                <h1 class="text-xl font-extrabold text-slate-800">Order Details</h1>
            </div>
            <div class="ml-auto active-badge px-4 py-1 rounded-full font-bold bg-orange-50 text-orange-600">
                <span id="detActiveCount">2</span> Active
            </div>
        </header>

        <div class="p-6 space-y-8 pb-32">
            <div id="itemsContainer" class="space-y-6"></div>

            <div class="border-t border-dashed border-slate-200 my-6"></div>

            <div class="bg-slate-50 p-6 rounded-[2.5rem] space-y-5 border border-slate-100 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center"><i class="fa fa-user text-slate-500"></i></div>
                    <span id="detName" class="font-bold text-xl text-slate-700"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center"><i class="fa fa-phone text-slate-500"></i></div>
                    <span id="detPhone" class="font-bold text-lg text-slate-700"></span>
                </div>
                <div class="flex items-center gap-4 items-start">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center shrink-0"><i class="fa fa-map-marker-alt text-slate-500"></i></div>
                    <span id="detAddr" class="text-slate-600 font-medium leading-relaxed"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button id="callBtn" class="bg-[#2ecc71] text-white py-5 rounded-[1.5rem] font-bold flex justify-center items-center gap-3 text-lg shadow-lg">
                    <i class="fa fa-phone"></i> Call
                </button>
                <button id="shareBtn" class="bg-[#1e272e] text-white py-5 rounded-[1.5rem] font-bold flex justify-center items-center gap-3 text-lg">
                    <i class="fa fa-share-nodes"></i> Share
                </button>
            </div>

            <button id="acceptBtn" class="w-full bg-[#f35c15] text-white py-6 rounded-[1.8rem] font-black text-xl tracking-wider uppercase shadow-xl active:scale-95 transition-transform">
                Accept Order
            </button>
        </div>
    </div>
   
     <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 px-6 py-3 z-">
        <div class="flex justify-between items-center max-w-md mx-auto text-slate-400">
            <a href="dashboard.html" class="flex flex-col items-center">
                <i class="fa-solid fa-house-chimney text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Home</span>
            </a>
            <a href="orders.html" class="flex flex-col items-center  text-orange-500 scale-110">
                <i class="fa-solid fa-clipboard-list text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Orders</span>
            </a>
            <a href="products.html" class="flex flex-col items-center">
                <i class="fa-solid fa-boxes-stacked text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Stock</span>
            </a>
            <a href="settings.html" class="flex flex-col items-center">
                <i class="fa-solid fa-user-gear text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Profile</span>
            </a>
        </div>
    </nav>
  

    <script src="js/orders.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cart | Sundha Mata Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        #orderSuccessPopup {
    animation: fadeIn 0.3s ease;
}
    </style>
</head>
<body class="bg-slate-50 pb-60"> <header class="p-6 bg-white flex items-center shadow-sm sticky top-0 z-40 border-b border-slate-100">
        <button onclick="window.location.href='home.html'" class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center mr-4 active:scale-90 transition-all">
            <i class="fas fa-chevron-left text-slate-800 text-lg"></i>
        </button>
        <h1 class="text-2xl font-black text-slate-900 tracking-tight">My Cart</h1>
    </header>

    <div class="p-6 space-y-4" id="cartItems">
        </div>

    <div id="orderRestrictionPopup" class="fixed inset-0 z-[999] hidden flex items-center justify-center p-6 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm text-center shadow-2xl animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-shopping-basket text-3xl"></i>
            </div>
            <h2 class="text-xl font-black mb-2 text-slate-800">Minimum Order ₹500</h2>
            <p class="text-slate-500 mb-8 font-medium">Boss, delivery ke liye kam se kam ₹500 ka saman hona chahiye. Thoda aur add kariye!</p>
            <button onclick="closePopup()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black active:scale-95 transition-all">OK, SAMJH GAYA</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-50">
        <div class="bg-white/90 backdrop-blur-xl border-t border-slate-100 p-6 shadow-[0_-5px_20px_rgba(0,0,0,0.03)]">
            <div class="flex justify-between mb-4 items-center max-w-md mx-auto">
                <span class="text-zinc-500 font-bold">Total Amount</span>
                <span class="text-3xl font-black text-orange-500 tracking-tighter" id="cartTotal">₹0</span>
            </div>
            <div class="max-w-md mx-auto">
                <button onclick="placeOrder()" id="orderBtn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl glow-orange active:scale-95 transition-all">
                    Place Order
                </button>
            </div>
        </div>

        <div id="orderSuccessPopup" class="fixed inset-0 hidden z-[999] flex items-center justify-center bg-white">
    
    <div class="text-center animate-bounce">
        
        <!-- Green Circle -->
        <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fas fa-check text-white text-4xl"></i>
        </div>

        <!-- Message -->
        <h2 class="text-2xl font-black text-slate-800 mb-2">
            Order Placed Successfully!
        </h2>
        <p class="text-slate-500 font-medium">
            Your order has been confirmed and is being processed.
        </p>

    </div>
</div>

        <nav class="bg-white/95 backdrop-blur-xl border-t border-slate-100 px-10 py-4">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="window.location.href='home.html'" class="flex flex-col items-center gap-1 text-slate-300">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-[9px] font-black">HOME</span>
                </button>
                <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-orange-500 relative">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[8px] w-4 h-4 rounded-full hidden flex items-center justify-center font-bold">0</span>
                    <span class="text-[9px] font-black">CART</span>
                </button>
            </div>
        </nav>
    </div>

    <script src="js/cart.js"></script>
</body>
</html>

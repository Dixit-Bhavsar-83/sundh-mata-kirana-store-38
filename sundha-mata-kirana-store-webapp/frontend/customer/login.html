<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sundha Mata Kirana Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* 70% Scrolling Section */
        .form-container {
            height: 70vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .form-container::-webkit-scrollbar { display: none; }

        .input-focus:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile-first scaling fix */
html {
    font-size: 14px; /* Default size kam kiya */
    -webkit-text-size-adjust: 100%;
}

body {
    width: 100%;
    overflow-x: hidden; /* Side scrolling roko */
    margin: 0;
    padding: 0;
}

/* Icons aur UI elements ko chhota aur normal karne ke liye */
i, .fa-solid, .fas {
    font-size: 0.9rem !important; 
}

.bnav-item, nav button {
    padding: 8px !important;
    font-size: 0.7rem !important;
}

/* Card aur container resizing */
.user-card, .product-card {
    padding: 12px !important;
    border-radius: 16px !important;
}

/* Nav bar fix */
nav {
    height: 60px !important;
    padding: 5px !important;
}
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

    <header class="p-8 pt-12 shrink-0">
        <div class="fade-in">
            <h1 class="text-3xl font-black tracking-tighter leading-tight">
                <span class="text-slate-800">Sundha Mata</span><br>
                <span class="text-orange-500 italic">Kirana Store</span>
            </h1>
            <p class="text-slate-400 font-semibold mt-2 text-sm">Apni Dukaan, Apne Mobile Par!</p>
        </div>
    </header>

    <main class="bg-white rounded-t-[3rem] shadow-2xl flex-1 flex flex-col overflow-hidden border-t border-slate-100">
        <div class="form-container p-8 space-y-6" id="formScroll">
            
            <div class="space-y-4">
                <h2 class="text-xl font-extrabold text-slate-800">Welcome, Boss!</h2>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Create One-Time Profile</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your name" 
                        class="w-full mt-1.5 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus transition-all font-semibold">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Phone Number</label>
                    <div class="flex gap-2 mt-1.5">
                        <div class="bg-slate-100 px-4 flex items-center justify-center rounded-2xl font-bold text-slate-500 border border-slate-100">+91</div>
                        <input type="tel" id="phoneNumber" maxlength="10" placeholder="10 Digit Number" 
                            class="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus transition-all font-bold tracking-widest">
                    </div>
                    <p id="phoneError" class="text-[10px] text-red-500 font-bold mt-1 hidden">Please enter a valid 10-digit number</p>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Profession (Optional)</label>
                    <select id="profession" class="w-full mt-1.5 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus transition-all font-semibold text-slate-700">
                        <option value="Student">Student</option>
                        <option value="Business">Business</option>
                        <option value="Farmer">Farmer</option>
                        <option value="Doctor">Doctor</option>
                        <option value="Lawyer">Lawyer</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Housewife">Housewife</option>
                        <option value="Govt Employee">Govt Employee</option>
                        <option value="Driver">Driver</option>
                        <option value="Worker">Daily Worker</option>
                        <option value="Shopkeeper">Shopkeeper</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">State</label>
                        <input type="text" value="Gujarat" disabled class="w-full mt-1.5 p-4 bg-slate-100 border border-slate-200 rounded-2xl text-slate-400 font-bold text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">City</label>
                        <input type="text" value="Ahmedabad" disabled class="w-full mt-1.5 p-4 bg-slate-100 border border-slate-200 rounded-2xl text-slate-400 font-bold text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Full Address</label>
                    <textarea id="fullAddress" maxlength="120" required placeholder="House No, Street, Area..." 
                        class="w-full mt-1.5 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus transition-all font-semibold resize-none h-24"></textarea>
                    <div class="flex justify-end mt-1">
                        <span id="charCount" class="text-[10px] font-bold text-slate-300">0/120</span>
                    </div>
                </div>
            </form>
        </div>

        <div class="p-6 bg-white border-t border-slate-50 shrink-0">
            <button id="continueBtn" disabled 
                class="w-full bg-slate-200 text-white font-black py-5 rounded-[2rem] shadow-lg transition-all duration-300 active:scale-95 uppercase tracking-wider">
                Continue to Shop
            </button>
        </div>
    </main>

    <script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>

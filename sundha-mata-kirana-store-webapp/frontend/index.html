<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" href="icon.png" type="image/x-icon">

<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* Button Glow effect */
        .btn-card:hover { box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15); }

             /* Mobile-first scaling fix */
html {
    font-size: 14px; /* Default size kam kiya */
    -webkit-text-size-adjust: 100%;
}

body {
    width: 100%;
    overflow-x: hidden; /* Side scrolling roko */
    margin: 0;
    padding: 0;
}

/* Icons aur UI elements ko chhota aur normal karne ke liye */
i, .fa-solid, .fas {
    font-size: 0.9rem !important; 
}

.bnav-item, nav button {
    padding: 8px !important;
    font-size: 0.7rem !important;
}

/* Card aur container resizing */
.user-card, .product-card {
    padding: 12px !important;
    border-radius: 16px !important;
}

/* Nav bar fix */
nav {
    height: 60px !important;
    padding: 5px !important;
}
    </style>
</head>
<body class="flex items-center justify-center h-screen p-6">

<div class="grid gap-6 w-full max-w-sm">
    
    <h1 class="text-3xl font-black text-slate-900 mb-4 text-center">Welcome, Boss! 👋</h1>

    <button onclick="goTo('customer')" class="btn-card bg-white p-6 rounded-[2rem] shadow-lg flex items-center gap-6 transition-all duration-500 hover:-translate-y-2 active:scale-95 text-left">
        <div class="w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl flex items-center justify-center text-2xl">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <div>
            <h2 class="text-xl font-black text-slate-800">Customer Panel</h2>
            <p class="text-sm text-zinc-400 font-medium">Shop & Order Products</p>
        </div>
    </button>

    <button onclick="goTo('owner')" class="btn-card bg-white p-6 rounded-[2rem] shadow-lg flex items-center gap-6 transition-all duration-500 hover:-translate-y-2 active:scale-95 text-left">
        <div class="w-16 h-16 bg-blue-100 text-blue-500 rounded-2xl flex items-center justify-center text-2xl">
            <i class="fas fa-store"></i>
        </div>
        <div>
            <h2 class="text-xl font-black text-slate-800">Owner Panel</h2>
            <p class="text-sm text-zinc-400 font-medium">Manage Store & Stocks</p>
        </div>
    </button>

    <button onclick="goTo('panel')" class="btn-card bg-white p-6 rounded-[2rem] shadow-lg flex items-center gap-6 transition-all duration-500 hover:-translate-y-2 active:scale-95 text-left">
        <div class="w-16 h-16 bg-purple-100 text-purple-500 rounded-2xl flex items-center justify-center text-2xl">
            <i class="fas fa-chart-line"></i>
        </div>
        <div>
            <h2 class="text-xl font-black text-slate-800">Test Panel</h2>
            <p class="text-sm text-zinc-400 font-medium">Check System Data</p>
        </div>
    </button>


</div>


 <script>
 function goTo(type) {
    const btn = event.currentTarget;
    btn.style.transform = "scale(0.9)";
    
    setTimeout(() => {
        // Changed paths to be relative (removed the starting /)
        if(type === 'customer') window.location.href = "customer/login.html";
        if(type === 'owner') window.location.href = "owner/login.html";
        if(type === 'panel') window.location.href = "penal/penal.html"; 
        if(type === 'delivery') window.location.href = "delivery-panel/delivery.html";
    }, 200);
}
</script>


</body>
</html>
